name: Supabase DB 자동 백업

on:
  schedule:
    - cron: '0 18 * * *'  # 매일 한국시간 새벽 3시 (UTC 18:00)
  workflow_dispatch:        # 수동 실행 가능

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 백업 파일을 저장소에 커밋하기 위해 필요

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests

      - name: Supabase DB 백업 실행
        env:
          SUPABASE_URL: https://vuifbmsdggnwygvgcrkj.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/backup_supabase.py

      - name: 백업 파일 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --staged --quiet || git commit -m "chore: Supabase DB 자동 백업 $(date +'%Y-%m-%d')"
          git push
